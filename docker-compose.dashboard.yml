# ============================================
# Docker Compose - Dashboard Only (Lightweight)
# ============================================
# Usage: docker-compose -f docker-compose.dashboard.yml up
# ============================================

version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ecommerce-dashboard
    ports:
      - "8080:8080"
    environment:
      - DASHBOARD_PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
